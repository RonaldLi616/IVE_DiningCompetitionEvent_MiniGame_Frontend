<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Unity 30人競技控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --bg: #121212; --accent: #007bff; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, sans-serif; overflow: hidden;
            touch-action: none;
        }

        #game-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh; height: 100vw;
                transform: rotate(90deg); transform-origin: center;
                position: fixed; top: 50%; left: 50%;
                margin-top: -50vw; margin-left: -50vh;
            }
        }

        #setup-ui { 
            text-align: center; 
            width: 95%; 
            max-width: 400px; 
            z-index: 20; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 8px; 
        }

        h2 { margin: 5px 0; font-size: 1.2rem; }

        input[type="text"] {
            width: 80%; 
            padding: 10px; 
            border-radius: 8px; 
            border: none; 
            font-size: 1rem; 
            text-align: center;
            background: #2a2a2a; 
            color: white;
        }

        #picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
        }

        #hex-label { 
            margin: 5px 0 0 0; 
            font-size: 0.8rem; 
            font-family: monospace; 
            opacity: 0.6; 
        }

        .btn-start { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 10px 40px; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            margin-top: 5px;
        }

        #control-ui { 
            display: none; 
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 20px;
        }

        #wheel-wrapper {
            position: relative;
            width: 65vmin; height: 65vmin;
        }

        #steering-wheel {
            width: 100%; height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease-out;
        }

        #angle-display {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: bold; font-family: monospace;
            z-index: 10; pointer-events: none;
        }

        #name-tag {
            font-size: 1.2rem; font-weight: bold;
            padding: 8px 25px; border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid currentColor;
        }

        @keyframes warning-flash { 0%, 100% { background-color: #121212; } 50% { background-color: #600000; } }
        .warning-active { animation: warning-flash 0.5s infinite; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="setup-ui">
            <h2>準備競賽</h2>
            <input type="text" id="player-name" placeholder="您的名稱" maxlength="10">
            <div id="picker-wrapper">
                <div id="iro-picker"></div>
                <p id="hex-label">#FF4757</p>
            </div>
            <button id="start-btn" class="btn-start">啟動控制器</button>
        </div>

        <div id="control-ui">
            <div id="name-tag">玩家名稱</div>
            <div id="wheel-wrapper">
                <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
                <div id="angle-display">0°</div>
            </div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);
        let selectedColorHex = "#ff4757", playerName = "", lastSteering = 0, lastSendTime = 0;

        const colorPicker = new iro.ColorPicker("#iro-picker", {
            width: 150,
            color: "#ff4757",
            layout: [
                { component: iro.ui.Wheel, options: { margin: 10 } },
                { component: iro.ui.Slider, options: { sliderType: 'value', margin: 10 } }
            ]
        });

        colorPicker.on('color:change', (color) => {
            selectedColorHex = color.hexString;
            document.getElementById('hex-label').innerText = selectedColorHex.toUpperCase();
        });

        document.getElementById('start-btn').addEventListener('click', async () => {
            playerName = document.getElementById('player-name').value.trim();
            if (!playerName) return alert("請輸入名稱！");

            // 請求權限 (iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') return alert("需授權感測器權限");
                } catch (e) { console.error(e); }
            }

            // 切換 UI
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('control-ui').style.display = 'flex'; 
            document.getElementById('name-tag').innerText = playerName;
            document.getElementById('name-tag').style.color = selectedColorHex;

            // 修正：發送正確的變數
            socket.emit('player-join', { name: playerName, color: selectedColorHex });

            // 啟動監聽
            window.addEventListener('deviceorientation', handleMotion, true);
        });

        function handleMotion(event) {
            // 如果沒抓到數據則跳過
            if (event.beta === null && event.gamma === null) return;

            const isPortrait = window.innerHeight > window.innerWidth;
            const orientationAngle = window.orientation || (screen.orientation && screen.orientation.angle) || 0;

            let rawAngle = 0;
            if (isPortrait) {
                rawAngle = event.gamma;
            } else {
                if (orientationAngle === 90) rawAngle = event.beta;
                else if (orientationAngle === -90 || orientationAngle === 270) rawAngle = -event.beta;
                else rawAngle = event.beta;
            }

            let clampedAngle = Math.max(-45, Math.min(45, Math.round(rawAngle || 0)));
            if (Math.abs(clampedAngle - lastSteering) > 50) clampedAngle = lastSteering;
            lastSteering = clampedAngle;

            // 更新 UI
            const steering = Math.abs(clampedAngle) < 3 ? 0 : clampedAngle;
            document.getElementById('steering-wheel').style.transform = `rotate(${clampedAngle * 1.2}deg)`;
            document.getElementById('angle-display').innerText = `${steering}°`;

            // 警告效果
            const container = document.getElementById('game-container');
            if (Math.abs(steering) >= 40) {
                container.classList.add('warning-active');
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                container.classList.remove('warning-active');
            }

            // 節流發送 (10Hz)
            let now = Date.now();
            if (now - lastSendTime > 100) {
                socket.emit('steering-data', {
                    name: playerName,
                    color: selectedColorHex,
                    angle: steering,
                    speedType: Math.abs(steering) > 30 ? 2 : (Math.abs(steering) > 0 ? 1 : 0)
                });
                lastSendTime = now;
            }
        }
    </script>
</body>
</html>
