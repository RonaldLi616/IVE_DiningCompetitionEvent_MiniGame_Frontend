<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>30人競技控制器 - 專業版</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --bg: #0f0f0f; --accent: #007bff; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; touch-action: none;
        }

        #game-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* 頂部功能鈕 */
        .top-bar {
            position: absolute; top: 15px; right: 15px; z-index: 100;
        }
        .icon-btn-close {
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }

        /* 設定 UI */
        #setup-ui { 
            text-align: center; width: 85%; max-width: 320px; 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
        }

        h2 { margin-bottom: 5px; font-size: 1.4rem; letter-spacing: 2px; color: #aaa; }

        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #333; 
            font-size: 1.1rem; text-align: center; background: #1e1e1e; color: white; outline: none;
            box-sizing: border-box;
        }

        #picker-wrapper {
            padding: 15px; background: rgba(255,255,255,0.03);
            border-radius: 20px; width: 100%; box-sizing: border-box;
        }
        .color-tools {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; width: 100%;
        }
        #hex-label { font-size: 0.85rem; font-family: monospace; opacity: 0.5; margin: 0; }
        .btn-small {
            background: #2a2a2a; border: 1px solid #444; color: white;
            padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;
        }

        /* 車輛選擇 */
        .car-selector { width: 100%; text-align: left; }
        .car-selector p { font-size: 0.8rem; opacity: 0.5; margin-left: 5px; }
        .car-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .car-option {
            background: #1e1e1e; border: 2px solid #333; border-radius: 12px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 8px; transition: 0.2s;
        }
        .car-option.active { border-color: var(--accent); background: rgba(0, 123, 255, 0.1); transform: scale(1.05); }
        .car-preview-img {
            width: 100%; height: 100%; background-color: #555; /* 圖片加載前的底色 */
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            mask-position: center;
        }

        .btn-start { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 16px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,123,255,0.4); margin-top: 10px;
        }

        /* 控制 UI */
        #control-ui { 
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: space-around;
            padding: 40px 0; box-sizing: border-box;
        }

        #player-profile { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #active-car-icon {
            width: 100px; height: 100px; background-color: white;
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            mask-position: center; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }
        #name-tag {
            font-size: 1.4rem; font-weight: bold; padding: 8px 30px; border-radius: 40px;
            background: rgba(0, 0, 0, 0.5); border: 2px solid currentColor;
        }

        #wheel-wrapper { position: relative; width: 75vw; height: 75vw; max-width: 350px; }
        #steering-wheel { width: 100%; height: 100%; transition: transform 0.05s linear; }
        #angle-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: 800; font-family: monospace; text-shadow: 0 0 10px black;
        }

        #hint-text { font-size: 0.9rem; opacity: 0.3; }

        @keyframes warning-flash { 0%, 100% { background-color: #0f0f0f; } 50% { background-color: #500000; } }
        .warning-active { animation: warning-flash 0.4s infinite; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <button id="close-btn" class="icon-btn-close">✕</button>
        </div>

        <div id="setup-ui">
            <h2>RACE JOIN</h2>
            <input type="text" id="player-name" placeholder="輸入名稱" maxlength="8">
            
            <div id="picker-wrapper">
                <div id="iro-picker"></div>
                <div class="color-tools">
                    <p id="hex-label">#FF4757</p>
                    <button id="random-color-btn" class="btn-small">🎲 隨機顏色</button>
                </div>
            </div>

            <div class="car-selector">
                <p>選擇座駕</p>
                <div class="car-grid" id="car-grid">
                    <div class="car-option active" data-car="car1">
                        <div class="car-preview-img" style="-webkit-mask-image: url('car1.png'); mask-image: url('car1.png');"></div>
                    </div>
                    <div class="car-option" data-car="car2">
                        <div class="car-preview-img" style="-webkit-mask-image: url('car2.png'); mask-image: url('car2.png');"></div>
                    </div>
                    <div class="car-option" data-car="car3">
                        <div class="car-preview-img" style="-webkit-mask-image: url('car3.png'); mask-image: url('car3.png');"></div>
                    </div>
                    <div class="car-option" data-car="car4">
                        <div class="car-preview-img" style="-webkit-mask-image: url('car4.png'); mask-image: url('car4.png');"></div>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="btn-start">START</button>
        </div>

        <div id="control-ui">
            <div id="player-profile">
                <div id="active-car-icon"></div>
                <div id="name-tag">PLAYER</div>
            </div>
            
            <div id="wheel-wrapper">
                <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
                <div id="angle-display">0°</div>
            </div>
            <div id="hint-text">左右傾斜手機來控制移動</div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);
        let selectedColorHex = "#ff4757", playerName = "", selectedCar = "car1", lastSteering = 0, lastSendTime = 0;

        // 初始化顏色選擇器
        const colorPicker = new iro.ColorPicker("#iro-picker", {
            width: 160, color: "#ff4757", borderWidth: 2, borderColor: "#fff",
            layout: [{ component: iro.ui.Wheel }, { component: iro.ui.Slider, options: { sliderType: 'value' } }]
        });

        // 監聽顏色變化
        colorPicker.on('color:change', (color) => {
            selectedColorHex = color.hexString;
            document.getElementById('hex-label').innerText = selectedColorHex.toUpperCase();
            // 即時更新車輛預覽顏色
            document.querySelectorAll('.car-preview-img').forEach(img => {
                img.style.backgroundColor = selectedColorHex;
            });
        });

        // 隨機顏色
        document.getElementById('random-color-btn').addEventListener('click', () => {
            colorPicker.color.set(iro.Color.random());
        });

        // 車輛選擇
        document.querySelectorAll('.car-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.car-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedCar = opt.getAttribute('data-car');
            });
        });

        // 關閉按鈕
        document.getElementById('close-btn').addEventListener('click', () => {
            if(confirm("確定離開？")) {
                window.close();
                setTimeout(() => window.location.href = "about:blank", 300);
            }
        });

        // 啟動控制器
        document.getElementById('start-btn').addEventListener('click', async () => {
            const inputName = document.getElementById('player-name').value.trim();
            if (!inputName) return alert("請輸入名稱");
            playerName = inputName;

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') return alert("需授權感測器");
                } catch (e) { console.error(e); }
            }

            // 更新控制頁面視覺
            const activeIcon = document.getElementById('active-car-icon');
            activeIcon.style.webkitMaskImage = `url('${selectedCar}.png')`;
            activeIcon.style.maskImage = `url('${selectedCar}.png')`;
            activeIcon.style.backgroundColor = selectedColorHex;

            const nameTag = document.getElementById('name-tag');
            nameTag.innerText = playerName;
            nameTag.style.color = selectedColorHex;

            // UI 切換
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('control-ui').style.display = 'flex'; 

            socket.emit('player-join', { 
                name: playerName, 
                color: selectedColorHex, 
                carType: selectedCar 
            });

            window.addEventListener('deviceorientation', handleMotion, true);
        });

        function handleMotion(event) {
            if (event.gamma === null) return;
            let clampedAngle = Math.max(-45, Math.min(45, Math.round(event.gamma)));
            if (Math.abs(clampedAngle - lastSteering) < 1) return;

            const steering = Math.abs(clampedAngle) < 3 ? 0 : clampedAngle;
            document.getElementById('steering-wheel').style.transform = `rotate(${clampedAngle * 1.5}deg)`;
            document.getElementById('angle-display').innerText = `${steering}°`;

            const container = document.getElementById('game-container');
            if (Math.abs(steering) >= 40) {
                container.classList.add('warning-active');
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                container.classList.remove('warning-active');
            }

            let now = Date.now();
            if (now - lastSendTime > 100) {
                socket.emit('steering-data', {
                    name: playerName,
                    color: selectedColorHex,
                    angle: steering,
                    speedType: Math.abs(steering) > 35 ? 2 : (Math.abs(steering) > 5 ? 1 : 0),
                    carType: selectedCar
                });
                lastSendTime = now;
                lastSteering = clampedAngle;
            }
        }
    </script>
</body>
</html>
