<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Unity 30人競技控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #007bff; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        /* 核心容器：確保永遠撐滿視窗 */
        #game-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* 處理 iPhone 直向時的強制旋轉 */
        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh; height: 100vw;
                transform: rotate(90deg); transform-origin: center;
                position: fixed; top: 50%; left: 50%;
                margin-top: -50vw; margin-left: -50vh;
            }
        }

        /* 設定介面 */
        #setup-ui { text-align: center; width: 85%; max-width: 400px; z-index: 20; }
        input[type="text"] {
            width: 100%; padding: 15px; margin: 15px 0;
            border-radius: 10px; border: none; font-size: 1.1rem; text-align: center;
        }
        .color-grid { display: flex; justify-content: space-around; margin: 20px 0; }
        .color-btn { width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
        .color-btn.active { border-color: white; transform: scale(1.2); }
        .btn-start { background: var(--accent); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; }

        /* 控制介面：強制居中 */
        #control-ui { 
            display: none; 
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* 方向盤外層：使用 vmin 確保在橫向時不會爆框 */
        #wheel-wrapper {
            position: relative;
            width: 70vmin; height: 70vmin;
            display: flex; align-items: center; justify-content: center;
        }

        #steering-wheel {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        /* 角度數字：絕對置中於方向盤 */
        #angle-display {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: bold; font-family: monospace;
            color: white; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            z-index: 10; pointer-events: none;
        }

        /* 隱藏不需要的元素 */
        #name-tag, #speed-label { display: none; }

        /* 警示效果 */
        @keyframes warning-flash { 0%, 100% { background-color: #121212; } 50% { background-color: #600000; } }
        .warning-active { animation: warning-flash 0.5s infinite; }
        
        .extreme-turn #steering-wheel { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(var(--current-deg)); }
            50% { transform: translate(-1px, -1px) rotate(var(--current-deg)); }
            100% { transform: translate(1px, -1px) rotate(var(--current-deg)); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="setup-ui">
            <h2>準備競賽</h2>
            <input type="text" id="player-name" placeholder="您的名稱" maxlength="10">
            <div class="color-grid">
                <div class="color-btn active" style="background: #ff4757;" data-color="Red"></div>
                <div class="color-btn" style="background: #1e90ff;" data-color="Blue"></div>
                <div class="color-btn" style="background: #2ed573;" data-color="Green"></div>
                <div class="color-btn" style="background: #ffa502;" data-color="Yellow"></div>
            </div>
            <button id="start-btn" class="btn-start">啟動控制器</button>
        </div>

        <div id="control-ui">
            <div id="wheel-wrapper">
                <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
                <div id="angle-display">0°</div>
            </div>
            <div id="name-tag" style="display:none;"></div>
            <div id="speed-label" style="display:none;"></div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);
        let selectedColor = "Red", playerName = "", lastSteering = 0;

        // 顏色選擇
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.getAttribute('data-color');
            });
        });

        // 啟動
        document.getElementById('start-btn').addEventListener('click', async () => {
            playerName = document.getElementById('player-name').value.trim();
            if (!playerName) return alert("請輸入名稱！");

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }

            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('control-ui').style.display = 'flex'; // 改為 flex 確保置中
            socket.emit('player-join', { name: playerName, color: selectedColor });
            initTracker();
        });

        function initTracker() {
            window.addEventListener('deviceorientation', (event) => {
                const isPortrait = window.innerHeight > window.innerWidth;
                let rawAngle = isPortrait ? event.gamma : event.beta;
                let clampedAngle = Math.max(-45, Math.min(45, Math.round(rawAngle)));

                if (Math.abs(clampedAngle - lastSteering) > 50) clampedAngle = lastSteering;
                lastSteering = clampedAngle;

                const container = document.getElementById('game-container');
                const display = document.getElementById('angle-display');
                const wheel = document.getElementById('steering-wheel');
                const wheelWrapper = document.getElementById('wheel-wrapper');

                let steering = Math.abs(clampedAngle) < 3 ? 0 : clampedAngle;
                const absA = Math.abs(steering);

                // 警告與震動邏輯
                if (absA >= 40) {
                    container.classList.add('warning-active');
                    wheelWrapper.classList.add('extreme-turn');
                    wheel.style.setProperty('--current-deg', `${clampedAngle * 1.2}deg`);
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    container.classList.remove('warning-active');
                    wheelWrapper.classList.remove('extreme-turn');
                }

                // 旋轉視覺更新
                wheel.style.transform = `rotate(${clampedAngle * 1.2}deg)`;
                display.innerText = `${steering}°`;

                // 發送數據
                socket.emit('steering-data', {
                    name: playerName,
                    color: selectedColor,
                    angle: steering * 2,
                    speedType: absA > 30 ? 2 : (absA > 0 ? 1 : 0)
                });
            }, true);
        }
    </script>
</body>
</html>
