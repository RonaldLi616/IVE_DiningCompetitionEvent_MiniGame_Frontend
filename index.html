<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Unity 30人競技控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --bg: #121212; --accent: #007bff; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        #game-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh; height: 100vw;
                transform: rotate(90deg); transform-origin: center;
                position: fixed; top: 50%; left: 50%;
                margin-top: -50vw; margin-left: -50vh;
            }
        }

        #setup-ui { text-align: center; width: 85%; max-width: 400px; z-index: 20; }
        input[type="text"] {
            width: 100%; padding: 15px; margin: 15px 0;
            border-radius: 10px; border: none; font-size: 1.1rem; text-align: center;
        }

        /* 選色器容器 */
        #picker-wrapper {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .btn-start { 
            background: var(--accent); color: white; border: none; 
            padding: 12px 60px; border-radius: 50px; font-size: 1.2rem; 
            cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        #control-ui { 
            display: none; 
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 20px;
        }

        #wheel-wrapper {
            position: relative;
            width: 65vmin; height: 65vmin;
            display: flex; align-items: center; justify-content: center;
        }

        #steering-wheel {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            transition: transform 0.1s ease-out;
        }

        #angle-display {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: bold; font-family: monospace;
            color: white; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            z-index: 10; pointer-events: none;
        }

        #name-tag {
            font-size: 1.2rem; font-weight: bold;
            padding: 8px 25px; border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid currentColor;
            color: white; flex-shrink: 0;
        }

        @keyframes warning-flash { 0%, 100% { background-color: #121212; } 50% { background-color: #600000; } }
        .warning-active { animation: warning-flash 0.5s infinite; }
        .extreme-turn #steering-wheel { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(var(--current-deg)); }
            50% { transform: translate(-1px, -1px) rotate(var(--current-deg)); }
            100% { transform: translate(1px, -1px) rotate(var(--current-deg)); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="setup-ui">
            <h2>準備競賽</h2>
            <input type="text" id="player-name" placeholder="您的名稱" maxlength="10">
            <div id="picker-wrapper">
                <div id="iro-picker"></div>
                <p id="hex-label" style="margin: 10px 0 0 0; font-family: monospace; opacity: 0.7;">#FF4757</p>
            </div>
            <button id="start-btn" class="btn-start">啟動控制器</button>
        </div>

        <div id="control-ui">
            <div id="name-tag">玩家名稱</div>
            <div id="wheel-wrapper">
                <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
                <div id="angle-display">0°</div>
            </div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);
        let selectedColorHex = "#ff4757", playerName = "", lastSteering = 0;

        // --- 初始化 iro.js 選色器 ---
        const colorPicker = new iro.ColorPicker("#iro-picker", {
            width: 180, // 手機端不要太大
            color: "#ff4757",
            layout: [
                { component: iro.ui.Wheel },
                { component: iro.ui.Slider, options: { sliderType: 'value' } }
            ]
        });

        // 監聽選色變化
        colorPicker.on('color:change', function(color) {
            selectedColorHex = color.hexString;
            document.getElementById('hex-label').innerText = selectedColorHex.toUpperCase();
        });

        document.getElementById('start-btn').addEventListener('click', async () => {
            playerName = document.getElementById('player-name').value.trim();
            if (!playerName) return alert("請輸入名稱！");

            // iOS 權限請求優化
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        alert("需授權動作感測器才能遊玩");
                        return;
                    }
                } catch (e) {
                    console.error("權限請求出錯:", e);
                }
            }

            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('control-ui').style.display = 'flex'; 
            
            const nameTag = document.getElementById('name-tag');
            nameTag.innerText = playerName;
            nameTag.style.color = selectedColorHex; // 直接使用 Hex 色值

            socket.emit('player-join', { name: playerName, color: selectedColor });
            initTracker();
        });

        function initTracker() {
            let lastSendTime = 0;
            window.addEventListener('deviceorientation', (event) => {
                const isPortrait = window.innerHeight > window.innerWidth;
        
                // 獲取螢幕旋轉角度 (0, 90, -90/270)
                const orientationAngle = window.orientation || (screen.orientation && screen.orientation.angle) || 0;

                // --- 核心修正處：橫向模式下將 beta 取負值以修正鏡像 ---
                let rawAngle = 0;
                if (isPortrait) {
                    rawAngle = event.gamma; // 直向正常使用 gamma
                } else {
                    // 處理兩種橫向模式
                    if (orientationAngle === 90) {
                        // Home 鍵在右側
                        rawAngle = event.beta;
                    } else if (orientationAngle === -90 || orientationAngle === 270) {
                        // Home 鍵在左側 (旋轉了 180 度)
                        rawAngle = -event.beta; // 移除負號，因為手機倒過來了
                    } else {
                        // 備用方案
                        rawAngle = event.beta;
                    }
                }

                // 確保數值存在，並限制在 -45 到 45 度
                let clampedAngle = Math.max(-45, Math.min(45, Math.round(rawAngle || 0)));

                // 突跳過濾：如果變化過大（例如手機翻轉），則維持上一次的角度
                if (Math.abs(clampedAngle - lastSteering) > 50) clampedAngle = lastSteering;
                lastSteering = clampedAngle;

                const container = document.getElementById('game-container');
                const display = document.getElementById('angle-display');
                const wheel = document.getElementById('steering-wheel');
                const wheelWrapper = document.getElementById('wheel-wrapper');

                // 死區處理：角度太小時視為 0，避免手震抖動
                let steering = Math.abs(clampedAngle) < 3 ? 0 : clampedAngle;
                const absA = Math.abs(steering);

                // UI 反饋：極限轉向時觸發震動與紅色警告
                if (absA >= 40) {
                    container.classList.add('warning-active');
                    wheelWrapper.classList.add('extreme-turn');
                    wheel.style.setProperty('--current-deg', `${clampedAngle * 1.2}deg`);
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    container.classList.remove('warning-active');
                    wheelWrapper.classList.remove('extreme-turn');
                }

                // 更新手機畫面的方向盤旋轉 (乘上 1.2 讓視覺轉向幅度大一點)
                wheel.style.transform = `rotate(${clampedAngle * 1.2}deg)`;
                display.innerText = `${steering}°`;

                // 節流發送資料：確保 10Hz (每 100 毫秒發送一次)
                let now = Date.now();
                if (now - lastSendTime < 100) return; 
                lastSendTime = now;

                // 發送數據到伺服器
                socket.emit('steering-data', {
                    name: playerName,
                    color: selectedColorHex, // 直接傳 Hex 色值
                    angle: steering, // 這裡建議傳原始 steering，Unity 那邊再決定要乘多少
                    speedType: absA > 30 ? 2 : (absA > 0 ? 1 : 0)
                });
            }, true);
        }
    </script>
</body>
</html>
