<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>手機方向盤控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 橫向鎖定提醒 */
        #rotate-notice {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media screen and (orientation: portrait) {
            #rotate-notice { display: flex; }
        }

        #status { font-size: 1.2rem; margin-bottom: 20px; color: #00ff00; }
        #data-display { font-family: monospace; font-size: 2rem; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div>
            <h2>請將手機旋轉至橫向 📱🔄</h2>
            <p>為了獲得最佳操控體驗</p>
        </div>
    </div>

    <div id="status">正在初始化...</div>
    <div id="data-display">角度: 0°</div>
    <br>
    <button id="start-btn">啟動控制器 (請求權限)</button>

    <script>
        // 1. 設定你的 Render 伺服器網址
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);

        const statusText = document.getElementById('status');
        const dataText = document.getElementById('data-display');
        const startBtn = document.getElementById('start-btn');

        // Socket 連線狀態監控
        socket.on('connect', () => {
            statusText.innerText = "已連線至伺服器";
            statusText.style.color = "#00ff00";
        });

        socket.on('disconnect', () => {
            statusText.innerText = "連線中斷";
            statusText.style.color = "#ff4444";
        });

        // 2. 處理感測器權限與邏輯
        startBtn.addEventListener('click', permissionRequiring);

        async function permissionRequiring() {
            // iOS 13+ 需要主動請求權限
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        initTracker();
                    } else {
                        alert("存取被拒絕");
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // 非 iOS 裝置直接啟動
                initTracker();
            }
            
            // 嘗試進入全螢幕並鎖定橫向 (部分安卓支援)
            try {
                // 必須先進入全螢幕模式，部分瀏覽器才允許鎖定方向
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                
                // 鎖定為橫向
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                    console.log("已成功鎖定橫向");
                }
            } catch (error) {
                console.error("鎖定失敗:", error);
                alert("請手動旋轉手機並開啟自動旋轉功能");
            }
            startBtn.style.display = 'none'; // 隱藏按鈕
        } 

        function initTracker() {
            window.addEventListener('deviceorientation', (event) => {
                // 當手機橫放 (Landscape) 時：
                // event.beta 代表手機的左右翻轉 (Steering)
                // 數值通常在 -90 到 90 之間
                let steering = Math.round(event.beta);

                // 更新畫面顯示
                dataText.innerText = `角度: ${steering}°`;

                // 3. 透過 Socket 發送數據到伺服器
                socket.emit('steering-data', {
                    angle: steering,
                    timestamp: Date.now()
                });
            });
        }

    </script>
</body>
</html>
