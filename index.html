<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>30人競技控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --bg: #0f0f0f; --accent: #007bff; --card-bg: rgba(255,255,255,0.05); }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; touch-action: none;
        }

        /* 全域置中容器 */
        #game-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }

        /* 關閉按鈕 */
        .top-bar { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .icon-btn-close {
            background: var(--card-bg); border: none; color: white;
            width: 44px; height: 44px; border-radius: 50%; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* 設定 UI 面板 */
        #setup-ui { 
            width: 85%; max-width: 350px;
            display: flex; flex-direction: column; 
            align-items: center; text-align: center; gap: 20px;
        }

        h2 { margin: 0; font-size: 1.6rem; letter-spacing: 2px; font-weight: 800; }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #333; 
            font-size: 1.1rem; text-align: center; background: #1e1e1e; color: white;
            box-sizing: border-box; outline: none; transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        /* 顏色選擇器區塊 */
        #picker-wrapper {
            width: 100%; padding: 20px; background: var(--card-bg);
            border-radius: 25px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }
        .color-tools {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 15px;
        }
        #hex-label { font-family: monospace; opacity: 0.6; font-size: 0.9rem; }
        .btn-random {
            background: #333; border: none; color: white; padding: 8px 15px;
            border-radius: 10px; font-size: 0.85rem; font-weight: bold;
        }

        /* 車輛網格：自動適應螢幕 */
        .car-selector { width: 100%; }
        .car-selector p { font-size: 0.85rem; opacity: 0.5; margin-bottom: 10px; }
        .car-grid {
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 4等分 */
            gap: 12px; width: 100%;
        }
        .car-option {
            background: #1a1a1a; border: 2px solid #333; border-radius: 15px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 10px; transition: all 0.2s ease;
        }
        .car-option.active { border-color: var(--accent); background: rgba(0, 123, 255, 0.15); transform: scale(1.05); }
        
        /* CSS Mask 圖示 */
        .car-mask {
            width: 100%; height: 100%;
            background-color: #fff;
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            mask-position: center;
        }

        .btn-start { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 1.4rem; font-weight: 800;
            box-shadow: 0 10px 25px rgba(0,123,255,0.4); cursor: pointer;
        }

        /* 控制 UI */
        #control-ui { 
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: space-evenly;
            padding: 50px 0; box-sizing: border-box;
        }
        #active-car-display {
            width: 120px; height: 120px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }
        #name-tag {
            font-size: 1.5rem; font-weight: bold; padding: 10px 35px; border-radius: 50px;
            background: rgba(0,0,0,0.6); border: 3px solid currentColor; margin-top: 15px;
        }

        #wheel-wrapper { position: relative; width: 80vw; height: 80vw; max-width: 380px; }
        #steering-wheel { width: 100%; height: 100%; object-fit: contain; }
        #angle-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; font-family: monospace;
        }

        @keyframes warning-flash { 0%, 100% { background-color: #0f0f0f; } 50% { background-color: #600000; } }
        .warning-active { animation: warning-flash 0.4s infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <button id="close-btn" class="icon-btn-close">✕</button>
    </div>

    <div id="setup-ui">
        <h2>RACE JOIN</h2>
        
        <input type="text" id="player-name" placeholder="您的名稱" maxlength="8">
        
        <div id="picker-wrapper">
            <div id="iro-picker"></div>
            <div class="color-tools">
                <p id="hex-label">#FF4757</p>
                <button id="random-btn" class="btn-random">🎲 RANDOM</button>
            </div>
        </div>

        <div class="car-selector">
            <p>SELECT YOUR CAR</p>
            <div class="car-grid">
                <div class="car-option active" data-car="car1">
                    <div class="car-mask" style="-webkit-mask-image: url('car1.png'); mask-image: url('car1.png');"></div>
                </div>
                <div class="car-option" data-car="car2">
                    <div class="car-mask" style="-webkit-mask-image: url('car2.png'); mask-image: url('car2.png');"></div>
                </div>
                <div class="car-option" data-car="car3">
                    <div class="car-mask" style="-webkit-mask-image: url('car3.png'); mask-image: url('car3.png');"></div>
                </div>
                <div class="car-option" data-car="car4">
                    <div class="car-mask" style="-webkit-mask-image: url('car4.png'); mask-image: url('car4.png');"></div>
                </div>
            </div>
        </div>

        <button id="start-btn" class="btn-start">START ENGINE</button>
    </div>

    <div id="control-ui">
        <div style="text-align:center;">
            <div id="active-car-display" class="car-mask"></div>
            <div id="name-tag">PLAYER</div>
        </div>
        
        <div id="wheel-wrapper">
            <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
            <div id="angle-display">0°</div>
        </div>
        <div style="opacity:0.3; font-size:0.9rem;">左右傾斜手機來控制移動</div>
    </div>
</div>

<script>
    const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
    const socket = io(RENDER_URL);
    let selectedColor = "#ff4757", playerName = "", selectedCar = "car1", lastSteering = 0, lastSendTime = 0;

    // 1. 初始化顏色選擇器
    const colorPicker = new iro.ColorPicker("#iro-picker", {
        width: 180, color: selectedColor,
        layout: [{ component: iro.ui.Wheel }, { component: iro.ui.Slider, options: { sliderType: 'value' } }]
    });

    // 2. 隨機顏色按鈕：更換 iro.js 顏色
    document.getElementById('random-btn').addEventListener('click', () => {
        colorPicker.color.set(iro.Color.random());
    });

    // 3. 顏色變化監聽：更新所有 UI 顏色
    colorPicker.on('color:change', (color) => {
        selectedColor = color.hexString;
        document.getElementById('hex-label').innerText = selectedColor.toUpperCase();
        // 更新網格中的車輛顏色
        document.querySelectorAll('.car-mask').forEach(el => {
            el.style.backgroundColor = selectedColor;
        });
    });

    // 4. 車輛選擇邏輯
    document.querySelectorAll('.car-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.car-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            selectedCar = opt.getAttribute('data-car');
        });
    });

    // 5. 關閉網頁
    document.getElementById('close-btn').addEventListener('click', () => {
        if(confirm("結束遊戲？")) {
            window.close();
            setTimeout(() => window.location.href = "about:blank", 300);
        }
    });

    // 6. 點擊 Start
    document.getElementById('start-btn').addEventListener('click', async () => {
        const input = document.getElementById('player-name').value.trim();
        if(!input) return alert("請輸入名稱");
        playerName = input;

        // 請求 iOS 權限
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return alert("需要感測器授權");
            } catch (e) {}
        }

        // 更新控制介面
        const activeIcon = document.getElementById('active-car-display');
        activeIcon.style.webkitMaskImage = `url('${selectedCar}.png')`;
        activeIcon.style.maskImage = `url('${selectedCar}.png')`;
        activeIcon.style.backgroundColor = selectedColor;

        const nameTag = document.getElementById('name-tag');
        nameTag.innerText = playerName;
        nameTag.style.color = selectedColor;

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('control-ui').style.display = 'flex'; 

        socket.emit('player-join', { name: playerName, color: selectedColor, carType: selectedCar });
        window.addEventListener('deviceorientation', handleMotion, true);
    });

    function handleMotion(event) {
        if (event.gamma === null) return;
        let angle = Math.max(-45, Math.min(45, Math.round(event.gamma)));
        const steering = Math.abs(angle) < 3 ? 0 : angle;

        document.getElementById('steering-wheel').style.transform = `rotate(${angle * 1.5}deg)`;
        document.getElementById('angle-display').innerText = `${steering}°`;

        const container = document.getElementById('game-container');
        if (Math.abs(steering) >= 40) {
            container.classList.add('warning-active');
            if (navigator.vibrate) navigator.vibrate(40);
        } else {
            container.classList.remove('warning-active');
        }

        let now = Date.now();
        if (now - lastSendTime > 100) {
            socket.emit('steering-data', {
                name: playerName, color: selectedColor, angle: steering,
                speedType: Math.abs(steering) > 35 ? 2 : (Math.abs(steering) > 5 ? 1 : 0),
                carType: selectedCar
            });
            lastSendTime = now;
        }
    }
</script>

</body>
</html>
