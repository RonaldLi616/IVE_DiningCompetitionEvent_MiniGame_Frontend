<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>手機方向盤控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* 遊戲容器：這是核心，當手機直放時，我們會旋轉這個 div */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* 當螢幕為直向 (Portrait) 時的虛擬旋轉邏輯 */
        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: center;
                /* 將容器定位在中央並旋轉 */
                position: fixed;
                top: 50%;
                left: 50%;
                margin-top: -50vw;
                margin-left: -50vh;
            }
        }
        
        #status { font-size: 1rem; margin-bottom: 20px; color: #888; }
        #data-display { font-size: 4rem; font-weight: bold; font-family: monospace; }
        
        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="status">準備連線...</div>
        <div id="data-display">0°</div>
        <br>
        <button id="start-btn">啟動控制器</button>
        <p class="instruction">若數字無跳動，請點擊按鈕授權感測器</p>
    </div>

    <script>
        // 1. 設定你的 Render 伺服器網址
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);

        const statusText = document.getElementById('status');
        const dataText = document.getElementById('data-display');
        const startBtn = document.getElementById('start-btn');

        // Socket 連線狀態監控
        socket.on('connect', () => {
            statusText.innerText = "已連線至伺服器";
            statusText.style.color = "#00ff00";
        });

        socket.on('disconnect', () => {
            statusText.innerText = "連線中斷";
            statusText.style.color = "#ff4444";
        });

        // 2. 處理感測器權限與邏輯
        startBtn.addEventListener('click', async () => {
            // 1. 請求 iOS 感測器權限
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        initTracker();
                    } else {
                        alert("存取被拒絕，請刷新頁面再試");
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initTracker();
            }
            
            // 2. 嘗試進入全螢幕 (Android 用)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            startBtn.style.display = 'none';
        });

        function initTracker() {
            window.addEventListener('deviceorientation', (event) => {
                let steering = 0;
                
                // 檢查目前手機是否物理上處於直向 (Portrait)
                const isPortrait = window.innerHeight > window.innerWidth;

                if (isPortrait) {
                    // 【重要】當手機直拿但畫面被旋轉 90 度時：
                    // 手機的左右傾斜會變成 event.gamma
                    steering = Math.round(event.gamma);
                } else {
                    // 當手機橫拿時：
                    // 手機的左右傾斜會變成 event.beta
                    steering = Math.round(event.beta);
                }

                // 數值平滑處理 (限制在 -90 到 90)
                if (steering > 90) steering = 90;
                if (steering < -90) steering = -90;

                dataText.innerText = `${steering}°`;

                // 發送數據
                socket.emit('steering-data', {
                    angle: steering,
                    timestamp: Date.now()
                });
            });
        }

    </script>
</body>
</html>
