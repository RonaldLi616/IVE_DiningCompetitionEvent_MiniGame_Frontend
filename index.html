<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CLP 問答競速: 食物碳排放對決</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --accent: #007bff; --card-bg: rgba(255,255,255,0.05); }

        * {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; touch-action: none;
            transition: background-color 0.1s;
        }

        /* 🟢 背景閃爍動畫：當轉向達到極限時觸發 */
        @keyframes background-flash {
            0% { background-color: var(--bg); }
            50% { background-color: #660000; } /* 閃爍暗紅色 */
            100% { background-color: var(--bg); }
        }

        .spark-bg-active {
            animation: background-flash 0.15s infinite linear;
        }

        #game-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }

        .top-bar { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .icon-btn-close {
            background: var(--card-bg); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* 設置介面 */
        #setup-ui { 
            width: 100%; max-width: 320px;
            padding: 0 20px;
            display: flex; flex-direction: column; 
            align-items: center; text-align: center; gap: 25px;
        }

        h2 { margin: 0; font-size: 1.6rem; letter-spacing: 2px; font-weight: 800; color: var(--accent); }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333; 
            font-size: 1.1rem; text-align: center; background: #1e1e1e; color: white;
            outline: none;
        }

        .car-selector { 
            width: 100%; 
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
        }
        .car-selector p { font-size: 0.8rem; opacity: 0.6; margin-bottom: 12px; font-weight: bold; }
        
        .car-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .car-scroll-container::-webkit-scrollbar { display: none; }

        .car-option {
            flex: 0 0 70px; height: 70px;
            background: #1a1a1a; border: 2px solid #333; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            padding: 12px; scroll-snap-align: start;
        }
        .car-option.active { border-color: var(--accent); background: rgba(0, 123, 255, 0.2); transform: scale(1.05); }
        
        .car-mask {
            width: 100%; height: 100%;
            background-color: #fff;
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            mask-position: center;
        }

        .btn-start { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 18px; border-radius: 50px; font-size: 1.3rem; font-weight: 800;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        /* 控制介面 */
        #control-ui { 
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: space-evenly;
            padding: 30px 0;
        }
        
        #live-stats {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 15px; width: 90%;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 10px 5px; flex: 1;
            display: flex; flex-direction: column; align-items: center;
        }

        .stat-label { font-size: 0.6rem; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-family: monospace; font-weight: 900; }

        #active-car-display { width: 75px; height: 75px; background-color: var(--accent); }
        #name-tag { font-size: 1.2rem; padding: 5px 25px; margin-top: 10px; border-radius: 20px; background: rgba(255,255,255,0.1); }

        #wheel-wrapper { position: relative; width: 75vw; height: 75vw; max-width: 320px; }
        #steering-wheel { width: 100%; height: 100%; object-fit: contain; transition: transform 0.05s linear; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <button id="close-btn" class="icon-btn-close">✕</button>
    </div>

    <div id="setup-ui">
        <h2>CLP 問答競速: 食物碳排放對決</h2>
        <input type="text" id="player-name" placeholder="輸入您的名稱" maxlength="8">
        
        <div class="car-selector">
            <p>選擇座駕</p>
            <div class="car-scroll-container">
                <div class="car-option active" data-car="car1">
                    <div class="car-mask" style="-webkit-mask-image: url('car1.png'); mask-image: url('car1.png');"></div>
                </div>
                <div class="car-option" data-car="car2">
                    <div class="car-mask" style="-webkit-mask-image: url('car2.png'); mask-image: url('car2.png');"></div>
                </div>
                <div class="car-option" data-car="car3">
                    <div class="car-mask" style="-webkit-mask-image: url('car3.png'); mask-image: url('car3.png');"></div>
                </div>
                <div class="car-option" data-car="car4">
                    <div class="car-mask" style="-webkit-mask-image: url('car4.png'); mask-image: url('car4.png');"></div>
                </div>
            </div>
        </div>

        <button id="start-btn" class="btn-start">引擎啟動</button>
    </div>

    <div id="control-ui">
        <div style="text-align:center; display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div id="live-stats">
                <div class="stat-box">
                    <span class="stat-label">名次</span>
                    <span id="live-rank" class="stat-value">--</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">積分</span>
                    <span id="live-score" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">時間</span>
                    <span id="live-time" class="stat-value">0s</span>
                </div>
            </div>

            <div id="active-car-display" class="car-mask"></div>
            <div id="name-tag">PLAYER</div>
        </div>
        
        <div id="wheel-wrapper">
            <img id="steering-wheel" src="SteeringWheel.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2062/2062128.png'">
        </div>
        
        <div style="opacity:0.4; font-size:0.8rem; letter-spacing:1px;">傾斜手機控制方向</div>
    </div>
</div>

<script>
    const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
    const socket = io(RENDER_URL);
    let defaultColor = "#007bff", playerName = "", selectedCar = "car1", lastSendTime = 0;

    // 車輛選擇
    document.querySelectorAll('.car-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.car-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            selectedCar = opt.getAttribute('data-car');
        });
    });

    document.getElementById('close-btn').addEventListener('click', () => {
        if(confirm("離開比賽？")) {
            window.location.reload();
        }
    });

    document.getElementById('start-btn').addEventListener('click', async () => {
        const input = document.getElementById('player-name').value.trim();
        if(!input) return alert("請輸入名稱");
        playerName = input;

        // 請求陀螺儀權限 (iOS)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return;
            } catch (e) { console.error(e); }
        }

        // 更新 UI
        const activeIcon = document.getElementById('active-car-display');
        activeIcon.style.webkitMaskImage = `url('${selectedCar}.png')`;
        activeIcon.style.maskImage = `url('${selectedCar}.png')`;
        document.getElementById('name-tag').innerText = playerName;

        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('control-ui').style.display = 'flex'; 

        socket.emit('player-join', { name: playerName, color: defaultColor, carType: selectedCar });
        window.addEventListener('deviceorientation', handleMotion, true);
    });

    // 監聽來自伺服器的個人數據
    socket.on('personal-result', (data) => {
        if (data.rank) document.getElementById('live-rank').innerText = `#${data.rank}`;
        if (data.score !== undefined) document.getElementById('live-score').innerText = data.score;
        if (data.timeTaken !== undefined) {
            let t = typeof data.timeTaken === 'number' ? data.timeTaken.toFixed(2) : data.timeTaken;
            document.getElementById('live-time').innerText = t + "s";
        }
    });

    function handleMotion(event) {
        if (event.gamma === null) return;

        let rawAngle = event.gamma; 
        let angle = Math.max(-45, Math.min(45, Math.round(rawAngle)));
        const steering = Math.abs(angle) < 3 ? 0 : angle;

        // 更新方向盤旋轉 (1.5倍旋轉感)
        document.getElementById('steering-wheel').style.transform = `rotate(${angle * 1.5}deg)`;

        // 🟢 背景火花閃爍特效
        if (Math.abs(angle) > 35) {
            document.body.classList.add('spark-bg-active');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        } else {
            document.body.classList.remove('spark-bg-active');
        }

        let now = Date.now();
        if (now - lastSendTime > 60) {
            socket.emit('steering-data', {
                name: playerName,
                color: defaultColor,
                angle: steering,
                speedType: Math.abs(steering) > 35 ? 2 : (Math.abs(steering) > 5 ? 1 : 0),
                carType: selectedCar
            });
            lastSendTime = now;
        }
    }
</script>
</body>
</html>
