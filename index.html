<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>手機方向盤控制器</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* 遊戲容器：這是核心，當手機直放時，我們會旋轉這個 div */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        /* 當螢幕為直向 (Portrait) 時的虛擬旋轉邏輯 */
        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: center;
                /* 將容器定位在中央並旋轉 */
                position: fixed;
                top: 50%;
                left: 50%;
                margin-top: -50vw;
                margin-left: -50vh;
            }
        }

        /* 設定介面樣式 */
        #setup-ui {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            text-align: center;
        }

        .color-options {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .color-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .color-btn.active {
            border-color: white;
            transform: scale(1.2);
        }

        /* 控制介面樣式 (預設隱藏) */
        #control-ui {
            display: none;
            text-align: center;
        }
        
        #data-display { font-size: 5rem; font-weight: bold; }

        .btn-primary {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="setup-ui">
            <h2>玩家設定</h2>
            <input type="text" id="player-name" placeholder="輸入你的名稱..." maxlength="10">
            
            <p>選擇車輛顏色：</p>
            <div class="color-options">
                <div class="color-btn active" style="background: #ff4444;" data-color="red"></div>
                <div class="color-btn" style="background: #4444ff;" data-color="blue"></div>
                <div class="color-btn" style="background: #44ff44;" data-color="green"></div>
                <div class="color-btn" style="background: #ffff44;" data-color="yellow"></div>
            </div>

            <button id="start-btn" class="btn-primary">啟動並連線</button>
        </div>

        <div id="control-ui">
            <div id="player-tag" style="font-size: 1.2rem; color: #aaa;"></div>
            <div id="data-display">0°</div>
            <p id="status">正在傳輸數據...</p>
        </div>

    </div>

    <script>
        // 1. 設定你的 Render 伺服器網址
        const RENDER_URL = "https://ive-diningcompetitionevent-minigame.onrender.com"; 
        const socket = io(RENDER_URL);

        let selectedColor = "red";
        let playerName = "";

        // 顏色選擇邏輯
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.getAttribute('data-color');
            });
        });

        // 啟動按鈕邏輯
        const startBtn = document.getElementById('start-btn');
        startBtn.addEventListener('click', async () => {
            playerName = document.getElementById('player-name').value.trim();
            if (!playerName) {
                alert("請輸入名稱！");
                return;
            }

            // iOS 權限請求
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') return;
                } catch (e) { console.error(e); }
            }

            // 切換 UI
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('control-ui').style.display = 'block';
            document.getElementById('player-tag').innerText = `玩家：${playerName}`;
            document.getElementById('player-tag').style.color = selectedColor;

            // 發送初始加入資料給伺服器
            socket.emit('player-join', {
                name: playerName,
                color: selectedColor
            });

            initTracker();
        });

        function initTracker() {
            window.addEventListener('deviceorientation', (event) => {
                const isPortrait = window.innerHeight > window.innerWidth;
                let steering = isPortrait ? Math.round(event.gamma) : Math.round(event.beta);

                if (steering > 90) steering = 90;
                if (steering < -90) steering = -90;

                document.getElementById('data-display').innerText = `${steering}°`;

                // 發送轉向數據 (包含玩家身分，方便 Unity 識別)
                socket.emit('steering-data', {
                    name: playerName,
                    color: selectedColor,
                    angle: steering
                });
            });
        }

    </script>
</body>
</html>
